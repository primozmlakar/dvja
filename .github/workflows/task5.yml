name: SBOM generation - Task 5
on:
  workflow_dispatch
jobs:
  create-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout of repo
        uses: actions/checkout@v6.0.2

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 8
          cache: maven

      - name: Build Maven project
        run: mvn -B clean package -DskipTest

      - name: SBOM Generation
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: dvja-sbom.spdx.json
          artifact-name: dvja-sbom.spdx.json

      - name: Install Grype tool
        run: curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin

      - name: Perform SCA analysis with Grype tool
        run: cat dvja-sbom.spdx.json | grype > dvja-sbom.sca.json

      - name: Upload SCA report
        uses: actions/upload-artifact@v7.0.0
        with:
          name: sca-report
          path: dvja-sbom.sca.json
